version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: netflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: netflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - netflow

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netflow-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/netflow
      NETFLOW_HOST: 0.0.0.0
      NETFLOW_PORT: 2055
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost"]'
    ports:
      - "8000:8000"  # API
      - "2055:2055/udp"  # NetFlow collector
      - "9090:9090"  # Metrics
    volumes:
      - models_data:/app/models
      - ./app:/app/app  # Development: mount code for hot reload
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - netflow

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netflow-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - netflow

  prometheus:
    image: prom/prometheus:latest
    container_name: netflow-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9091:9090"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - netflow

  grafana:
    image: grafana/grafana:latest
    container_name: netflow-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - netflow

volumes:
  postgres_data:
  models_data:
  prometheus_data:
  grafana_data:

networks:
  netflow:
    driver: bridge
